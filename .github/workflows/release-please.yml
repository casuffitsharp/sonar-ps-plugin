name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  PSSCRIPTANALYZER_VERSION: "1.24.0"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

  build_and_upload:
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.release_created == 'true'
    needs: release-please
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache PSScriptAnalyzer
        id: cache-pssa
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.pssa_module
          key: pssa-${{ env.PSSCRIPTANALYZER_VERSION }}-${{ runner.os }}

      - name: Install PSScriptAnalyzer
        if: steps.cache-pssa.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/.pssa_module" -Force
          Save-Module -Name PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Path "${{ github.workspace }}/.pssa_module" -Force

      - name: Set PSModulePath
        shell: pwsh
        run: |
          $modulePath = "${{ github.workspace }}/.pssa_module"
          $sep = [IO.Path]::PathSeparator
          $newPath = "$modulePath$sep$env:PSModulePath"
          echo "PSModulePath=$newPath" >> $env:GITHUB_ENV

      - name: Build
        run: mvn -f sonar-ps-plugin/pom.xml package

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: sonar-ps-plugin/target/*.jar
          fail_on_unmatched_files: true
