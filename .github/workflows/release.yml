name: Release

on:
  release:
    types: [published]

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  PSSCRIPTANALYZER_VERSION: "1.20"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Scope CurrentUser -Force

      - name: Verify POM version matches tag
        run: |
          tagVersion="${{ steps.version.outputs.version }}"
          pomVersion="$(mvn -q -f sonar-ps-plugin/pom.xml help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "Tag version: $tagVersion"
          echo "POM version: $pomVersion"
          if [ "$pomVersion" != "$tagVersion" ]; then
            echo "ERROR: sonar-ps-plugin/pom.xml version ($pomVersion) does not match tag version ($tagVersion)."
            exit 1
          fi

      - name: Build
        run: mvn -f sonar-ps-plugin/pom.xml package

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: sonar-ps-plugin/target/sonar-ps-plugin-${{ steps.version.outputs.version }}.jar
          fail_on_unmatched_files: true