name: Release

on:
  release:
    types: [published]

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  PSSCRIPTANALYZER_VERSION: "1.24.0"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache PSScriptAnalyzer
        id: cache-pssa
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.pssa_module
          key: pssa-${{ env.PSSCRIPTANALYZER_VERSION }}-${{ runner.os }}

      - name: Install PSScriptAnalyzer
        if: steps.cache-pssa.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/.pssa_module" -Force
          Save-Module -Name PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Path "${{ github.workspace }}/.pssa_module" -Force

      - name: Set PSModulePath
        shell: pwsh
        run: |
          $modulePath = "${{ github.workspace }}/.pssa_module"
          $sep = [IO.Path]::PathSeparator
          $newPath = "$modulePath$sep$env:PSModulePath"
          echo "PSModulePath=$newPath" >> $env:GITHUB_ENV

      - name: Verify POM version matches tag
        run: |
          tagVersion="${{ steps.version.outputs.version }}"
          pomVersion="$(mvn -q -f sonar-ps-plugin/pom.xml help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "Tag version: $tagVersion"
          echo "POM version: $pomVersion"
          if [ "$pomVersion" != "$tagVersion" ]; then
            echo "ERROR: sonar-ps-plugin/pom.xml version ($pomVersion) does not match tag version ($tagVersion)."
            exit 1
          fi

      - name: Build
        run: mvn -f sonar-ps-plugin/pom.xml package

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: sonar-ps-plugin/target/sonar-ps-plugin-${{ steps.version.outputs.version }}.jar
          fail_on_unmatched_files: true