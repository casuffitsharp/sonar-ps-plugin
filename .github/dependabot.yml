version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/sonar-ps-plugin"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "ci(deps):"

  - package-ecosystem: "docker"
    directory: "/sampleProject"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "docs(deps):"
